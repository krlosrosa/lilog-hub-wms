version: '3.8'

services:
  devrunner:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: lilog-dev
    restart: unless-stopped
    volumes:
      - .:/app
      - dev_node_modules:/app/node_modules
    ports:
      - '3001:3001'
      - '3000:3000'
      - '5174:5174'
      - '5175:5175'
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:-postgres://user:pass@host.docker.internal:5432/lilog}
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost:5174,http://localhost:5175}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_USERNAME: ${REDIS_USERNAME:-}
      RAVEX_BASE_URL: ${RAVEX_BASE_URL:-}
      RAVEX_USERNAME: ${RAVEX_USERNAME:-}
      RAVEX_PASSWORD: ${RAVEX_PASSWORD:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_API_TOKEN: ${R2_API_TOKEN:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
      PUPPETEER_SKIP_DOWNLOAD: 'true'
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
      VITE_API_URL: ${VITE_API_URL:-/api}
      VITE_API_PORT: ${VITE_API_PORT:-3001}
    depends_on:
      redis:
        condition: service_started
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  redis:
    image: redis:7-alpine
    container_name: lilog-redis-dev
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_dev_data:/data

volumes:
  dev_node_modules:
  redis_dev_data:
