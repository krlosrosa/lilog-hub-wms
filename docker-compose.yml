version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: lilog-api
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NODE_OPTIONS: '--max-old-space-size=768'
      PORT: ${PORT:-3001}
      DATABASE_URL: ${DATABASE_URL}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://admin-dev.logistica-processo.com,https://pwa-dev.logistica-processo.com,https://lideranca-dev.logistica-processo.com,https://portal-dev.logistica-processo.com}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_USERNAME: ${REDIS_USERNAME:-}
      RAVEX_BASE_URL: ${RAVEX_BASE_URL}
      RAVEX_USERNAME: ${RAVEX_USERNAME}
      RAVEX_PASSWORD: ${RAVEX_PASSWORD}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_API_TOKEN: ${R2_API_TOKEN:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_TOKEN_ID: ${R2_TOKEN_ID:-}
      R2_REGION: ${R2_REGION:-auto}
      R2_S3_ENDPOINT: ${R2_S3_ENDPOINT:-}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-https://api-dev.logistica-processo.com}
      SWAGGER_PUBLIC_URL: ${SWAGGER_PUBLIC_URL:-https://api-dev.logistica-processo.com/api/docs}
      BULL_BOARD_PUBLIC_URL: ${BULL_BOARD_PUBLIC_URL:-https://api-dev.logistica-processo.com/queues}
      PWA_BASE_URL: ${PWA_BASE_URL:-https://pwa-dev.logistica-processo.com}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-.logistica-processo.com}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      PUPPETEER_SKIP_DOWNLOAD: 'true'
    depends_on:
      redis:
        condition: service_started
    networks:
      - proxy
      - internal
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1024M
        reservations:
          memory: 512M
    labels:
      - traefik.enable=true
      - traefik.http.routers.lilog-api.rule=Host(`${API_HOST:-api-dev.logistica-processo.com}`)
      - traefik.http.routers.lilog-api.service=lilog-api
      - traefik.http.routers.lilog-api.entrypoints=websecure
      - traefik.http.routers.lilog-api.tls=true
      - traefik.http.routers.lilog-api.tls.certresolver=cloudflare
      - traefik.http.services.lilog-api.loadbalancer.server.port=3001

  landing:
    build:
      context: .
      dockerfile: Dockerfile.landing
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://logistica-processo.com}
        NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL:-https://admin.logistica-processo.com}
    container_name: lilog-landing
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: 3003
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://logistica-processo.com}
      NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL:-https://admin.logistica-processo.com}
    networks:
      - proxy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 256M
    labels:
      - traefik.enable=true
      - traefik.http.routers.lilog-landing.rule=Host(`${LANDING_HOST:-logistica-processo.com}`)
      - traefik.http.routers.lilog-landing.service=lilog-landing
      - traefik.http.routers.lilog-landing.entrypoints=websecure
      - traefik.http.routers.lilog-landing.tls=true
      - traefik.http.routers.lilog-landing.tls.certresolver=cloudflare
      - traefik.http.routers.lilog-landing-www.rule=Host(`${LANDING_WWW_HOST:-www.logistica-processo.com}`)
      - traefik.http.routers.lilog-landing-www.service=lilog-landing
      - traefik.http.routers.lilog-landing-www.entrypoints=websecure
      - traefik.http.routers.lilog-landing-www.tls=true
      - traefik.http.routers.lilog-landing-www.tls.certresolver=cloudflare
      - traefik.http.routers.lilog-landing-www.middlewares=redirect-www-to-apex@file
      - traefik.http.services.lilog-landing.loadbalancer.server.port=3003

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api-dev.logistica-processo.com/api}
    container_name: lilog-web
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api-dev.logistica-processo.com/api}
    networks:
      - proxy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          memory: 384M
    labels:
      - traefik.enable=true
      - traefik.http.routers.lilog-web.rule=Host(`${WEB_HOST:-admin-dev.logistica-processo.com}`)
      - traefik.http.routers.lilog-web.service=lilog-web
      - traefik.http.routers.lilog-web.entrypoints=websecure
      - traefik.http.routers.lilog-web.tls=true
      - traefik.http.routers.lilog-web.tls.certresolver=cloudflare
      - traefik.http.services.lilog-web.loadbalancer.server.port=3000

  pwa:
    build:
      context: .
      dockerfile: Dockerfile.pwa
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api-dev.logistica-processo.com/api}
        VITE_API_PORT: ${VITE_API_PORT:-443}
    container_name: lilog-pwa
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    networks:
      - proxy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    labels:
      - traefik.enable=true
      - traefik.http.routers.lilog-pwa.rule=Host(`${PWA_HOST:-pwa-dev.logistica-processo.com}`)
      - traefik.http.routers.lilog-pwa.service=lilog-pwa
      - traefik.http.routers.lilog-pwa.entrypoints=websecure
      - traefik.http.routers.lilog-pwa.tls=true
      - traefik.http.routers.lilog-pwa.tls.certresolver=cloudflare
      - traefik.http.services.lilog-pwa.loadbalancer.server.port=80

  pwa-lideranca:
    build:
      context: .
      dockerfile: Dockerfile.pwa-lideranca
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api-dev.logistica-processo.com/api}
        VITE_API_PORT: ${VITE_API_PORT:-443}
    container_name: lilog-pwa-lideranca
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    networks:
      - proxy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    labels:
      - traefik.enable=true
      - traefik.http.routers.lilog-pwa-lideranca.rule=Host(`${PWA_LIDERANCA_HOST:-lideranca-dev.logistica-processo.com}`)
      - traefik.http.routers.lilog-pwa-lideranca.service=lilog-pwa-lideranca
      - traefik.http.routers.lilog-pwa-lideranca.entrypoints=websecure
      - traefik.http.routers.lilog-pwa-lideranca.tls=true
      - traefik.http.routers.lilog-pwa-lideranca.tls.certresolver=cloudflare
      - traefik.http.services.lilog-pwa-lideranca.loadbalancer.server.port=80

  portal:
    build:
      context: .
      dockerfile: Dockerfile.portal
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api-dev.logistica-processo.com/api}
    container_name: lilog-portal
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: 3002
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api-dev.logistica-processo.com/api}
    networks:
      - proxy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 256M
    labels:
      - traefik.enable=true
      - traefik.http.routers.lilog-portal.rule=Host(`${PORTAL_HOST:-portal-dev.logistica-processo.com}`)
      - traefik.http.routers.lilog-portal.service=lilog-portal
      - traefik.http.routers.lilog-portal.entrypoints=websecure
      - traefik.http.routers.lilog-portal.tls=true
      - traefik.http.routers.lilog-portal.tls.certresolver=cloudflare
      - traefik.http.services.lilog-portal.loadbalancer.server.port=3002

  redis:
    image: redis:7-alpine
    container_name: lilog-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 320M
        reservations:
          memory: 128M

networks:
  proxy:
    external: true
  internal:
    driver: bridge

volumes:
  redis_data:
