version: '3.8'

# Produção — builds por serviço (sem infra neste compose: Redis/Traefik já existentes).
#
# Portainer: use "Web editor" ou Git com compose path = docker-compose-prod.yml
# Defina DATABASE_URL, JWT_SECRET etc. nas env vars da stack (não precisa de .env no servidor).
# O env_file abaixo é opcional (required: false) — serve só se você criar .env manualmente via SSH.
#
# Servidor com pouca RAM: build um serviço por vez via SSH antes do deploy:
#   docker compose -f docker-compose-prod.yml build api
#   docker compose -f docker-compose-prod.yml build web
#   ...
#   docker compose -f docker-compose-prod.yml up -d

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: lilog-api-prod
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      NODE_OPTIONS: '--max-old-space-size=768'
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://admin-dev.logistica-processo.com,https://pwa-dev.logistica-processo.com,https://lideranca-dev.logistica-processo.com,https://portal-dev.logistica-processo.com}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_USERNAME: ${REDIS_USERNAME:-}
      RAVEX_BASE_URL: ${RAVEX_BASE_URL:-}
      RAVEX_USERNAME: ${RAVEX_USERNAME:-}
      RAVEX_PASSWORD: ${RAVEX_PASSWORD:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_API_TOKEN: ${R2_API_TOKEN:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-https://api-dev.logistica-processo.com}
      SWAGGER_PUBLIC_URL: ${SWAGGER_PUBLIC_URL:-https://api-dev.logistica-processo.com/api/docs}
      BULL_BOARD_PUBLIC_URL: ${BULL_BOARD_PUBLIC_URL:-https://api-dev.logistica-processo.com/queues}
      PWA_BASE_URL: ${PWA_BASE_URL:-https://pwa-dev.logistica-processo.com}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-.logistica-processo.com}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      PUPPETEER_SKIP_DOWNLOAD: 'true'
      SENTRY_DSN: ${API_SENTRY_DSN:-}
    networks:
      - proxy
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1024M
        reservations:
          memory: 512M
    labels:
      - traefik.enable=true
      - traefik.http.routers.lilog-api-prod.rule=Host(`${API_HOST:-api-dev.logistica-processo.com}`)
      - traefik.http.routers.lilog-api-prod.service=lilog-api-prod
      - traefik.http.routers.lilog-api-prod.entrypoints=websecure
      - traefik.http.routers.lilog-api-prod.tls=true
      - traefik.http.routers.lilog-api-prod.tls.certresolver=cloudflare
      - traefik.http.services.lilog-api-prod.loadbalancer.server.port=3001

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api-dev.logistica-processo.com/api}
        NEXT_PUBLIC_SENTRY_DSN: ${WEB_SENTRY_DSN:-}
        SENTRY_ORG: ${SENTRY_ORG:-}
        SENTRY_PROJECT: ${WEB_SENTRY_PROJECT:-lilog-web}
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
    container_name: lilog-web-prod
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api-dev.logistica-processo.com/api}
      NEXT_PUBLIC_SENTRY_DSN: ${WEB_SENTRY_DSN:-}
    networks:
      - proxy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          memory: 384M
    labels:
      - traefik.enable=true
      - traefik.http.routers.lilog-web-prod.rule=Host(`${WEB_HOST:-admin-dev.logistica-processo.com}`)
      - traefik.http.routers.lilog-web-prod.service=lilog-web-prod
      - traefik.http.routers.lilog-web-prod.entrypoints=websecure
      - traefik.http.routers.lilog-web-prod.tls=true
      - traefik.http.routers.lilog-web-prod.tls.certresolver=cloudflare
      - traefik.http.services.lilog-web-prod.loadbalancer.server.port=3000

  pwa:
    build:
      context: .
      dockerfile: Dockerfile.pwa
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api-dev.logistica-processo.com/api}
        VITE_API_PORT: ${VITE_API_PORT:-443}
        VITE_SENTRY_DSN: ${PWA_SENTRY_DSN:-}
        SENTRY_ORG: ${SENTRY_ORG:-}
        SENTRY_PROJECT: ${PWA_SENTRY_PROJECT:-lilog-pwa}
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
    container_name: lilog-pwa-prod
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    networks:
      - proxy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    labels:
      - traefik.enable=true
      - traefik.http.routers.lilog-pwa-prod.rule=Host(`${PWA_HOST:-pwa-dev.logistica-processo.com}`)
      - traefik.http.routers.lilog-pwa-prod.service=lilog-pwa-prod
      - traefik.http.routers.lilog-pwa-prod.entrypoints=websecure
      - traefik.http.routers.lilog-pwa-prod.tls=true
      - traefik.http.routers.lilog-pwa-prod.tls.certresolver=cloudflare
      - traefik.http.services.lilog-pwa-prod.loadbalancer.server.port=80

  pwa-lideranca:
    build:
      context: .
      dockerfile: Dockerfile.pwa-lideranca
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api-dev.logistica-processo.com/api}
        VITE_API_PORT: ${VITE_API_PORT:-443}
        VITE_SENTRY_DSN: ${PWA_LIDERANCA_SENTRY_DSN:-}
        SENTRY_ORG: ${SENTRY_ORG:-}
        SENTRY_PROJECT: ${PWA_LIDERANCA_SENTRY_PROJECT:-lilog-pwa-lideranca}
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
    container_name: lilog-pwa-lideranca-prod
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    networks:
      - proxy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    labels:
      - traefik.enable=true
      - traefik.http.routers.lilog-pwa-lideranca-prod.rule=Host(`${PWA_LIDERANCA_HOST:-lideranca-dev.logistica-processo.com}`)
      - traefik.http.routers.lilog-pwa-lideranca-prod.service=lilog-pwa-lideranca-prod
      - traefik.http.routers.lilog-pwa-lideranca-prod.entrypoints=websecure
      - traefik.http.routers.lilog-pwa-lideranca-prod.tls=true
      - traefik.http.routers.lilog-pwa-lideranca-prod.tls.certresolver=cloudflare
      - traefik.http.services.lilog-pwa-lideranca-prod.loadbalancer.server.port=80

  portal:
    build:
      context: .
      dockerfile: Dockerfile.portal
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api-dev.logistica-processo.com/api}
        NEXT_PUBLIC_SENTRY_DSN: ${PORTAL_SENTRY_DSN:-}
        SENTRY_ORG: ${SENTRY_ORG:-}
        SENTRY_PROJECT: ${PORTAL_SENTRY_PROJECT:-lilog-portal}
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
    container_name: lilog-portal-prod
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: 3002
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api-dev.logistica-processo.com/api}
      NEXT_PUBLIC_SENTRY_DSN: ${PORTAL_SENTRY_DSN:-}
    networks:
      - proxy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 256M
    labels:
      - traefik.enable=true
      - traefik.http.routers.lilog-portal-prod.rule=Host(`${PORTAL_HOST:-portal-dev.logistica-processo.com}`)
      - traefik.http.routers.lilog-portal-prod.service=lilog-portal-prod
      - traefik.http.routers.lilog-portal-prod.entrypoints=websecure
      - traefik.http.routers.lilog-portal-prod.tls=true
      - traefik.http.routers.lilog-portal-prod.tls.certresolver=cloudflare
      - traefik.http.services.lilog-portal-prod.loadbalancer.server.port=3002

networks:
  proxy:
    external: true
